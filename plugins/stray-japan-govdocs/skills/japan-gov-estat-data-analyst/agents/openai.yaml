interface:
  display_name: "Japan Gov e-Stat Data Analyst"
  short_description: "Analyze selected e-Stat tables with explicit provenance."
  default_prompt: "Use $japan-gov-estat-data-analyst to find or analyze the requested e-Stat table; inspect metadata first and report table IDs, filters, units, access state, derivations, and caveats."
dependencies:
  tools:
    - type: "mcp"
      value: "e-stats-mcp"
      description: "Retrieve e-Stat table metadata and values through the configured connector."
