  short_description: "Search, retrieve, and analyze selected e-Stat tables with explicit access state."
  default_prompt: "Find or use the requested e-Stat table, inspect metadata before values, and return table IDs, filters, units, access path or fallback, derivations, and caveats."
dependencies:
